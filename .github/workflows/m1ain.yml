name: Build executable

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # 拉取源码
      - uses: actions/checkout@v5

      # 安装pnpm
      - uses: pnpm/action-setup@v5
        with:
          version: 10

      # 安装Node，缓存前端依赖
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web-panel/pnpm-lock.yaml

      # 安装编译必备环境：VS C++工具、.NET Framework 4.8
      - name: Install Visual Studio Build Tools workloads
        uses: ilammy/vs-buildtools-action@v1
        with:
          workloads: >
            Microsoft.VisualStudio.Workload.VCTools
            Microsoft.Net.Component.4.8.TargetingPack
            Microsoft.Net.Component.4.8.SDK

      # 执行项目原生完整构建脚本（和本地build.ps1逻辑完全一致）
      - name: Run full build script
        shell: pwsh
        run: ./build.ps1 -Configuration Release

      # 上传编译成品
      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: WandEnhancer-unsigned
          path: WandEnhancer/bin/Release/WandEnhancer.exe
          if-no-files-found: error
