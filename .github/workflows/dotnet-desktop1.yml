name: Build Wand Enhancer EXE
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      # 拉取完整仓库代码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 安装.NET 8 SDK
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 调试：打印所有csproj确认路径（可选，排错用）
      - name: List all project files
        run: Get-ChildItem -Recurse *.csproj

      # 编译单文件Release可执行程序（修正文件夹+文件名）
      - name: Publish Single EXE
        run: |
          cd WeModPatcher
          dotnet publish WeModPatcher.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true

      # 上传编译好的可执行文件
      - name: Upload compiled Wand Enhancer
        uses: actions/upload-artifact@v4
        with:
          name: WandEnhancer-Win-x64
          path: WeModPatcher/bin/Release/net8.0/win-x64/publish/*.exe
